<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#111820"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#00FF94"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Subtle Grid -->
  <g stroke="#1C2128" stroke-width="1">
    <g id="hLines">
      <line x1="0" y1="40" x2="1200" y2="40"/>
      <line x1="0" y1="80" x2="1200" y2="80"/>
      <line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="280" x2="1200" y2="280"/>
      <line x1="0" y1="320" x2="1200" y2="320"/>
    </g>
    <g id="vLines">
      <line x1="60" y1="0" x2="60" y2="320"/>
      <line x1="180" y1="0" x2="180" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/>
      <line x1="420" y1="0" x2="420" y2="320"/>
      <line x1="540" y1="0" x2="540" y2="320"/>
      <line x1="660" y1="0" x2="660" y2="320"/>
      <line x1="780" y1="0" x2="780" y2="320"/>
      <line x1="900" y1="0" x2="900" y2="320"/>
      <line x1="1020" y1="0" x2="1020" y2="320"/>
      <line x1="1140" y1="0" x2="1140" y2="320"/>
    </g>
  </g>

  <!-- Animated Horizontal Scanline -->
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#00D9FF" stroke-width="2" opacity="0.15" stroke-dasharray="20 40">
    <animateTransform attributeName="transform" type="translate" values="0,-120; 0,120; 0,-120" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Animated Neon Border Lines -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="#00D9FF" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0 1200; 600 600; 1200 0; 600 600; 0 1200" dur="6s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="318" x2="1200" y2="318" stroke="#00FF94" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="1200 0; 600 600; 0 1200; 600 600; 1200 0" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Corner Accents -->
  <path d="M 20 20 L 20 50 M 20 20 L 50 20" stroke="#00D9FF" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 1180 20 L 1180 50 M 1180 20 L 1150 20" stroke="#00D9FF" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 20 300 L 20 270 M 20 300 L 50 300" stroke="#00FF94" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 1180 300 L 1180 270 M 1180 300 L 1150 300" stroke="#00FF94" stroke-width="3" fill="none" opacity="0.8"/>

  <!-- Main Title -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Segoe UI', monospace"
        font-size="64" font-weight="900" letter-spacing="6"
        fill="url(#textGrad)" filter="url(#glow)">
    HOANG DONG
  </text>

  <!-- Subtitle -->
  <text x="50%" y="72%" text-anchor="middle" dominant-baseline="middle"
        font-family="'SF Mono', 'Fira Code', monospace"
        font-size="22" font-weight="500" letter-spacing="4"
        fill="#8B949E">
    FLUTTER DEV  @  DEV DEN  ·  MOBILE  ·  VIETNAM
  </text>

  <!-- Decorative Code Brackets -->
  <text x="24%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-size="60" fill="#21262D" font-weight="300">
    &lt;
  </text>
  <text x="76%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-size="60" fill="#21262D" font-weight="300">
    /&gt;
  </text>

  <!-- Floating Dots -->
  <circle cx="150" cy="80" r="4" fill="#00D9FF" opacity="0.8">
    <animate attributeName="cy" values="80;100;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="240" r="4" fill="#00FF94" opacity="0.6">
    <animate attributeName="cy" values="240;220;240" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="260" r="3" fill="#00D9FF" opacity="0.5">
    <animate attributeName="cy" values="260;240;260" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="70" r="3" fill="#00FF94" opacity="0.4">
    <animate attributeName="cy" values="70;90;70" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Small Binary/Text decoration -->
  <text x="50" y="300" font-family="monospace" font-size="10" fill="#21262D" letter-spacing="2">01000100 01001111 01001110 01000111</text>
  <text x="890" y="30" font-family="monospace" font-size="10" fill="#21262D" letter-spacing="2">pdong15dth</text>
</svg>
